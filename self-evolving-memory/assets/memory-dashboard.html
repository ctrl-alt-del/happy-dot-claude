<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Dashboard — Self-Evolving Memory</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #252836;
  --border: #2e3142;
  --text: #e1e4eb;
  --text2: #8b90a0;
  --text3: #5c6174;
  --accent: #6c8aff;
  --gotcha: #ff6b6b;
  --pattern: #51cf66;
  --decision: #ffd43b;
  --fact: #74c0fc;
  --deprecated: #495057;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.sidebar {
  width: 360px;
  min-width: 360px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-header h1 { font-size: 16px; font-weight: 600; }
.sidebar-header .version { font-size: 11px; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 10px; }

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-content { flex: 1; overflow-y: auto; padding: 16px 20px; display: none; }
.tab-content.active { display: block; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px;
}
.stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
.stat-card .sublabel { font-size: 11px; color: var(--text2); margin-top: 2px; }

.type-bars { margin-top: 12px; }
.type-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.type-bar .bar { flex: 1; height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; }
.type-bar .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

.entry-list { display: flex; flex-direction: column; gap: 8px; }
.entry-item {
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color 0.15s;
}
.entry-item:hover { border-color: var(--border); }
.entry-item.selected { border-color: var(--accent); }
.entry-item .entry-type {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 2px 6px;
  border-radius: 4px;
  display: inline-block;
  margin-bottom: 4px;
}
.entry-item .entry-type.gotcha { background: rgba(255,107,107,0.15); color: var(--gotcha); }
.entry-item .entry-type.pattern { background: rgba(81,207,102,0.15); color: var(--pattern); }
.entry-item .entry-type.decision { background: rgba(255,212,59,0.15); color: var(--decision); }
.entry-item .entry-type.fact { background: rgba(116,192,252,0.15); color: var(--fact); }
.entry-item .entry-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.entry-item .entry-meta { font-size: 11px; color: var(--text3); }
.entry-item .access-count { font-size: 11px; }
.entry-item.deprecated { opacity: 0.5; }

.main { flex: 1; display: flex; flex-direction: column; }
.main-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.main-header h2 { font-size: 15px; font-weight: 600; }
.main-header .controls { display: flex; gap: 8px; }
.btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: var(--border); }
.btn:disabled { opacity: 0.4; cursor: default; }

#graph { flex: 1; position: relative; }
#graph svg { width: 100%; height: 100%; }

.detail-panel {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 360px;
  max-height: calc(100% - 32px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  overflow-y: auto;
  display: none;
  z-index: 10;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.detail-panel.visible { display: block; }
.detail-panel .close-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 18px;
}
.detail-panel .detail-type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.detail-panel .detail-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
.detail-panel .detail-body { font-size: 13px; line-height: 1.6; color: var(--text2); margin-bottom: 16px; }
.detail-panel .detail-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.detail-panel .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--surface2); color: var(--text2); }
.detail-panel .detail-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: var(--text3); }
.detail-panel .detail-stats span { color: var(--text2); }

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text3);
  font-size: 14px;
}
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text3);
  gap: 12px;
}
.empty-state .icon { font-size: 40px; }
.empty-state p { font-size: 14px; max-width: 300px; text-align: center; }

.log-entry { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.log-entry .log-time { color: var(--text3); font-size: 11px; }
.log-entry .log-phase { font-weight: 600; color: var(--accent); }

.review-item {
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}
.review-item .review-reason { font-size: 11px; color: var(--gotcha); margin-bottom: 4px; }
.review-item .review-title { font-size: 13px; font-weight: 600; }
.review-item .review-meta { font-size: 11px; color: var(--text3); margin-top: 4px; }

.edge-label { font-size: 9px; fill: var(--text3); pointer-events: none; }
.node-label { font-size: 10px; fill: var(--text); pointer-events: none; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>Memory Dashboard</h1>
    <span class="version" id="sidebar-version">--</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="health">Health</button>
    <button class="tab" data-tab="entries">Entries</button>
    <button class="tab" data-tab="review">Review</button>
    <button class="tab" data-tab="log">Log</button>
  </div>

  <div class="tab-content active" id="tab-health">
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Total</div><div class="value" id="stat-total">0</div></div>
      <div class="stat-card"><div class="label">Active</div><div class="value" id="stat-active">0</div></div>
      <div class="stat-card"><div class="label">Deprecated</div><div class="value" id="stat-deprecated">0</div></div>
      <div class="stat-card"><div class="label">Pinned</div><div class="value" id="stat-pinned">0</div></div>
    </div>
    <div class="type-bars" id="type-bars"></div>
    <div class="stat-grid" style="margin-top:16px;">
      <div class="stat-card"><div class="label">Graph Nodes</div><div class="value" id="stat-nodes">0</div></div>
      <div class="stat-card"><div class="label">Edges</div><div class="value" id="stat-edges">0</div></div>
      <div class="stat-card"><div class="label">Communities</div><div class="value" id="stat-communities">0</div></div>
      <div class="stat-card"><div class="label">Raw Obs.</div><div class="value" id="stat-raw">0</div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-entries">
    <div class="entry-list" id="entry-list"></div>
  </div>

  <div class="tab-content" id="tab-review">
    <div id="review-queue"></div>
  </div>

  <div class="tab-content" id="tab-log">
    <div id="evolution-log"></div>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <h2 id="graph-title">Knowledge Graph</h2>
    <div class="controls">
      <button class="btn" id="btn-fit" disabled>Fit to View</button>
      <button class="btn" id="btn-communities" disabled>Color by Community</button>
      <select class="btn" id="filter-type" style="display:none;" disabled>
        <option value="all">All Types</option>
        <option value="gotcha">Gotchas</option>
        <option value="pattern">Patterns</option>
        <option value="decision">Decisions</option>
        <option value="fact">Facts</option>
      </select>
    </div>
  </div>
  <div id="graph">
    <div class="empty-state" id="graph-empty">
      <div class="icon">&#9671;</div>
      <p>Drop memory/meta.json and memory/graph.json here, or serve from project root.</p>
    </div>
  </div>
  <div class="detail-panel" id="detail-panel">
    <button class="close-btn" onclick="hideDetail()">×</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
let metaData = null;
let graphData = null;
let simulation = null;

const typeColors = {
  gotcha: '#ff6b6b',
  pattern: '#51cf66',
  decision: '#ffd43b',
  fact: '#74c0fc',
  unknown: '#8b90a0'
};

function init() {
  loadData();
  setupTabs();
  setupDropZone();
}

function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });
}

function setupDropZone() {
  const zone = document.getElementById('graph');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.background = 'rgba(108,138,255,0.05)'; });
  zone.addEventListener('dragleave', () => { zone.style.background = ''; });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.style.background = '';
    const files = Array.from(e.dataTransfer.files);
    for (const f of files) {
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.version && data.entries !== undefined) metaData = data;
          if (data.version && data.nodes !== undefined) graphData = data;
          if (metaData || graphData) renderAll();
        } catch (ex) { console.error('Invalid JSON:', f.name); }
      };
      reader.readAsText(f);
    }
  });
}

async function loadData() {
  try {
    const metaRes = await fetch('../memory/meta.json');
    if (metaRes.ok) metaData = await metaRes.json();
    const graphRes = await fetch('../memory/graph.json');
    if (graphRes.ok) graphData = await graphRes.json();
    if (metaData || graphData) renderAll();
  } catch (e) {
    document.getElementById('graph-empty').style.display = 'flex';
  }
}

function renderAll() {
  if (!metaData) return;
  updateHealthPanel();
  updateEntryList();
  updateReviewQueue();
  updateEvolutionLog();
  updateGraph();
  document.getElementById('sidebar-version').textContent = 'v' + (metaData.version || '?');
  document.getElementById('graph-empty').style.display = 'none';
  document.getElementById('btn-fit').disabled = false;
  document.getElementById('btn-communities').disabled = false;
  document.getElementById('filter-type').style.display = 'inline-block';
  document.getElementById('filter-type').disabled = false;
}

function updateHealthPanel() {
  const entries = metaData.entries || [];
  const total = entries.length;
  const active = entries.filter(e => !e.deprecated).length;
  const deprecated = entries.filter(e => e.deprecated).length;
  const pinned = entries.filter(e => e.pinned).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-deprecated').textContent = deprecated;
  document.getElementById('stat-pinned').textContent = pinned;

  const byType = {};
  for (const e of entries) { byType[e.type || 'unknown'] = (byType[e.type || 'unknown'] || 0) + 1; }

  let barsHtml = '';
  for (const [type, count] of Object.entries(byType)) {
    const pct = total > 0 ? Math.round(count / total * 100) : 0;
    barsHtml += `<div class="type-bar">
      <span style="color:${typeColors[type] || typeColors.unknown}; width:70px; text-transform:capitalize">${type}</span>
      <span style="width:30px;text-align:right">${count}</span>
      <div class="bar"><div class="bar-fill" style="width:${pct}%; background:${typeColors[type] || typeColors.unknown}"></div></div>
    </div>`;
  }
  document.getElementById('type-bars').innerHTML = barsHtml;

  if (graphData) {
    document.getElementById('stat-nodes').textContent = (graphData.nodes || []).length;
    document.getElementById('stat-edges').textContent = (graphData.edges || []).length;
    document.getElementById('stat-communities').textContent = Object.keys(graphData.communities || {}).length;
  }
  document.getElementById('stat-raw').textContent = '--';
}

function updateEntryList() {
  const entries = metaData.entries || [];
  const list = document.getElementById('entry-list');
  if (entries.length === 0) {
    list.innerHTML = '<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">No entries yet.</div>';
    return;
  }
  list.innerHTML = entries.map((e, i) => {
    const cls = e.deprecated ? 'deprecated' : '';
    const title = (e.title || 'Entry ' + e.id).substring(0, 60);
    return `<div class="entry-item ${cls}" data-idx="${i}" onclick="selectEntry(${i})">
      <span class="entry-type ${e.type || 'unknown'}">${e.type || 'unknown'}</span>
      <div class="entry-title">${escapeHtml(title)}</div>
      <div class="entry-meta">
        ${e.tags ? e.tags.map(t => '#' + t).join(' ') : ''}
        ${e.pinned ? ' 📌' : ''}
        ${e.deprecated ? ' ⚰' : ''}
      </div>
    </div>`;
  }).join('');
}

function selectEntry(idx) {
  document.querySelectorAll('.entry-item').forEach(e => e.classList.remove('selected'));
  document.querySelectorAll('.entry-item')[idx]?.classList.add('selected');
  showDetail(metaData.entries[idx]);
}

function showDetail(entry) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="detail-type" style="color:${typeColors[entry.type] || typeColors.unknown}">${entry.type || 'unknown'}</div>
    <div class="detail-title">${escapeHtml(entry.title || 'Entry ' + entry.id)}</div>
    <div class="detail-body">${escapeHtml(entry.body || '(no content)').substring(0, 1000)}</div>
    <div class="detail-tags">${(entry.tags || []).map(t => `<span class="tag">#${t}</span>`).join('')}</div>
    <div class="detail-stats">
      <div>Confidence <span>${(entry.confidence || 0).toFixed(2)}</span></div>
      <div>Accessed <span>${entry.access_count || 0} times</span></div>
      <div>Created <span>${(entry.created || '--').substring(0, 10)}</span></div>
      <div>Status <span>${entry.deprecated ? 'Deprecated' : entry.pinned ? 'Pinned' : 'Active'}</span></div>
    </div>
  `;
  panel.classList.add('visible');
}

function hideDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
}

function updateReviewQueue() {
  const entries = metaData.entries || [];
  const review = entries.filter(e => !e.pinned && !e.deprecated && (e.confidence || 0) < 0.5);
  const queue = document.getElementById('review-queue');
  if (review.length === 0) {
    queue.innerHTML = '<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">No items for review.</div>';
    return;
  }
  queue.innerHTML = review.map(e => `
    <div class="review-item">
      <div class="review-reason">Confidence: ${(e.confidence || 0).toFixed(2)}</div>
      <div class="review-title">${escapeHtml(e.title || e.id)}</div>
      <div class="review-meta">Created ${(e.created || '--').substring(0, 10)} · ${e.access_count || 0} accesses</div>
    </div>
  `).join('');
}

function updateEvolutionLog() {
  document.getElementById('evolution-log').innerHTML = `
    <div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">
      Evolution log is populated after each<br>memory-evolve.sh run.
    </div>
  `;
}

function updateGraph() {
  const container = document.getElementById('graph');
  container.querySelector('svg')?.remove();

  if (!graphData || !graphData.nodes || graphData.nodes.length === 0) {
    const empty = document.getElementById('graph-empty');
    if (empty) empty.style.display = 'flex';
    return;
  }

  const W = container.clientWidth;
  const H = container.clientHeight;

  const svg = d3.select('#graph').append('svg').attr('width', W).attr('height', H);
  const g = svg.append('g');

  svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform)));

  const nodes = graphData.nodes.map(n => ({...n}));
  const edges = (graphData.edges || []).map(e => ({...e}));

  const colorByCommunity = document.getElementById('btn-communities').dataset.mode === 'community';

  const link = g.append('g').selectAll('line')
    .data(edges).join('line')
    .attr('stroke', 'var(--border)')
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.6);

  const linkLabel = g.append('g').selectAll('text')
    .data(edges).join('text')
    .attr('class', 'edge-label')
    .text(d => d.relation || '');

  const node = g.append('g').selectAll('circle')
    .data(nodes).join('circle')
    .attr('r', d => 5 + (d.confidence || 0.5) * 12)
    .attr('fill', d => colorByCommunity
      ? d3.schemeTableau10[(d.community || 0) % 10]
      : (typeColors[d.type] || typeColors.unknown))
    .attr('stroke', 'var(--surface)')
    .attr('stroke-width', 2)
    .attr('cursor', 'pointer')
    .on('click', (ev, d) => {
      const entry = (metaData?.entries || []).find(e => e.id === d.id);
      if (entry) showDetail(entry);
    })
    .call(d3.drag()
      .on('start', (ev, d) => { if (!ev.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end', (ev, d) => { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  const label = g.append('g').selectAll('text')
    .data(nodes).join('text')
    .attr('class', 'node-label')
    .text(d => (d.title || d.id || '').substring(0, 25))
    .attr('dx', d => 8 + (d.confidence || 0.5) * 12)
    .attr('dy', 4);

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide().radius(d => 12 + (d.confidence || 0.5) * 12))
    .on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      linkLabel.attr('x', d => (d.source.x + d.target.x) / 2)
               .attr('y', d => (d.source.y + d.target.y) / 2);
      node.attr('cx', d => d.x).attr('cy', d => d.y);
      label.attr('x', d => d.x).attr('y', d => d.y);
    });

  document.getElementById('btn-fit').onclick = () => {
    const bounds = g.node().getBBox();
    const dx = bounds.width;
    const dy = bounds.height;
    const x = bounds.x + dx / 2;
    const y = bounds.y + dy / 2;
    const scale = Math.min(0.9, Math.min(W / dx, H / dy));
    svg.transition().duration(500).call(
      d3.zoom().transform,
      d3.zoomIdentity.translate(W / 2 - scale * x, H / 2 - scale * y).scale(scale)
    );
  };

  document.getElementById('btn-communities').onclick = function() {
    const current = this.dataset.mode;
    this.dataset.mode = current === 'community' ? 'type' : 'community';
    this.textContent = current === 'community' ? 'Color by Community' : 'Color by Type';
    colorByCommunity = this.dataset.mode === 'community';
    node.attr('fill', d => colorByCommunity
      ? d3.schemeTableau10[(d.community || 0) % 10]
      : (typeColors[d.type] || typeColors.unknown));
  };

  document.getElementById('filter-type').onchange = function() {
    const val = this.value;
    node.style('display', d => val === 'all' || d.type === val ? null : 'none');
    label.style('display', d => val === 'all' || d.type === val ? null : 'none');
  };
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
</body>
</html>
